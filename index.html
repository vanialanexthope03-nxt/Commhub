<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CommHub — Générateur de contenus IA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

    .topbar { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-brand { font-size: 18px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 8px; }
    .topbar-brand span { font-weight: 400; color: #888; font-size: 14px; }
    .topbar-badge { font-size: 12px; background: #EEEDFE; color: #3C3489; padding: 4px 10px; border-radius: 20px; }

    .container { max-width: 860px; margin: 0 auto; padding: 32px 24px; }

    .card { background: #fff; border-radius: 14px; border: 1px solid #e5e5e0; padding: 28px; margin-bottom: 20px; }
    .card-title { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; color: #666; font-weight: 500; }
    select, input, textarea {
      font-family: inherit; font-size: 14px; color: #1a1a1a;
      background: #fafaf8; border: 1px solid #e0e0d8; border-radius: 8px;
      padding: 9px 12px; width: 100%; transition: border 0.15s;
    }
    select:focus, input:focus, textarea:focus { outline: none; border-color: #7F77DD; }
    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }

    .filiale-desc { font-size: 12px; margin-top: 5px; padding: 4px 10px; border-radius: 20px; display: inline-block; }
    .desc-aina { background: #EEEDFE; color: #3C3489; }
    .desc-nexthope { background: #E6F1FB; color: #0C447C; }
    .desc-cartin { background: #E1F5EE; color: #085041; }

    .network-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill { padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1px solid #e0e0d8; cursor: pointer; background: #fff; color: #666; transition: all 0.15s; }
    .pill:hover { border-color: #7F77DD; color: #3C3489; }
    .pill.active { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; font-weight: 500; }

    .generate-btn {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 500;
      background: #534AB7; color: #fff; border: none; border-radius: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      gap: 8px; transition: background 0.15s; margin-top: 8px;
    }
    .generate-btn:hover { background: #3C3489; }
    .generate-btn:disabled { background: #b0acd8; cursor: not-allowed; }

    .result-card { background: #fafaf8; border: 1px solid #e5e5e0; border-radius: 12px; padding: 20px; margin-top: 20px; }
    .result-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .result-meta-left { font-size: 13px; color: #666; display: flex; align-items: center; gap: 8px; }
    .result-meta-right { font-size: 12px; color: #999; }
    .result-text { font-size: 15px; color: #1a1a1a; line-height: 1.75; white-space: pre-wrap; }
    .result-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid #e5e5e0; flex-wrap: wrap; }
    .action-btn {
      font-size: 13px; padding: 7px 14px; background: #fff;
      border: 1px solid #e0e0d8; border-radius: 8px; color: #555;
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.15s;
    }
    .action-btn:hover { border-color: #7F77DD; color: #3C3489; }

    .loading { display: flex; align-items: center; gap: 10px; color: #888; font-size: 14px; padding: 20px 0; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #7F77DD; animation: bounce 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }

    .char-count { font-size: 12px; color: #999; text-align: right; margin-top: 4px; }
    .char-over { color: #E24B4A; }

    .history-section { margin-top: 8px; }
    .history-item { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
    .history-item-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .history-badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; }
    .history-text { font-size: 14px; color: #444; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .empty-history { text-align: center; color: #bbb; font-size: 14px; padding: 24px 0; }

    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #fff; padding: 6px; border-radius: 12px; border: 1px solid #e5e5e0; }
    .tab { flex: 1; padding: 9px; text-align: center; font-size: 14px; border-radius: 8px; cursor: pointer; color: #666; transition: all 0.15s; }
    .tab.active { background: #534AB7; color: #fff; font-weight: 500; }
    .tab:hover:not(.active) { background: #f0eff8; color: #534AB7; }

    .section { display: none; }
    .section.active { display: block; }

    .copied-toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .copied-toast.show { opacity: 1; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .container { padding: 16px; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <i class="ti ti-speakerphone"></i> CommHub <span>/ Groupe Aina</span>
  </div>
  <div class="topbar-badge">IA activée</div>
</div>

<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('generator')"><i class="ti ti-sparkles"></i> Générateur</div>
    <div class="tab" onclick="switchTab('history')"><i class="ti ti-history"></i> Historique</div>
  </div>

  <!-- GENERATEUR -->
  <div id="tab-generator" class="section active">
    <div class="card">
      <div class="card-title"><i class="ti ti-building"></i> Paramètres du post</div>

      <div class="form-grid">
        <div class="form-group">
          <label>Filiale</label>
          <select id="filiale" onchange="updateFilialeDesc()">
            <option value="aina">Aina (groupe)</option>
            <option value="nexthope">Nexthope</option>
            <option value="cartin">Cart'in</option>
          </select>
          <div id="filiale-desc" class="filiale-desc desc-aina">Dynamique · Corporate · Fun</div>
        </div>
        <div class="form-group">
          <label>Réseau social</label>
          <div class="network-pills" id="network-pills">
            <div class="pill active" onclick="selectNetwork(this,'LinkedIn')">LinkedIn</div>
            <div class="pill" onclick="selectNetwork(this,'Facebook')">Facebook</div>
            <div class="pill" onclick="selectNetwork(this,'Instagram')">Instagram</div>
            <div class="pill" onclick="selectNetwork(this,'Twitter/X')">Twitter/X</div>
          </div>
        </div>
      </div>

      <div class="form-group" style="margin-bottom:16px">
        <label>Sujet ou message clé</label>
        <textarea id="sujet" placeholder="Ex : Lancement d'un nouveau service, événement interne, recrutement, bonne nouvelle..." oninput="updateCharCount()"></textarea>
        <div class="char-count"><span id="char-count">0</span> caractères</div>
      </div>

      <div class="form-group" style="margin-bottom:20px">
        <label>Objectif du post</label>
        <select id="objectif">
          <option value="engagement">Engager la communauté</option>
          <option value="info">Informer / annoncer</option>
          <option value="recrutement">Recruter</option>
          <option value="image">Renforcer l'image de marque</option>
        </select>
      </div>

      <button class="generate-btn" onclick="generatePost()" id="gen-btn">
        <i class="ti ti-sparkles"></i> Générer le post
      </button>
    </div>

    <div id="loading" style="display:none" class="loading">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      <span>L'IA rédige votre post...</span>
    </div>

    <div id="result-wrapper" style="display:none" class="card">
      <div class="card-title"><i class="ti ti-file-text"></i> Post généré</div>
      <div class="result-card">
        <div class="result-meta">
          <div class="result-meta-left">
            <span id="result-filiale-badge" class="filiale-desc"></span>
            <span id="result-network" style="font-size:13px;color:#666;"></span>
          </div>
          <div class="result-meta-right" id="result-char-count"></div>
        </div>
        <div id="result-text" class="result-text"></div>
        <div class="result-actions">
          <button class="action-btn" onclick="copyPost()"><i class="ti ti-copy"></i> Copier</button>
          <button class="action-btn" onclick="generatePost()"><i class="ti ti-refresh"></i> Régénérer</button>
          <button class="action-btn" onclick="saveToHistory()"><i class="ti ti-bookmark"></i> Sauvegarder</button>
        </div>
      </div>
    </div>
  </div>

  <!-- HISTORIQUE -->
  <div id="tab-history" class="section">
    <div class="card">
      <div class="card-title"><i class="ti ti-history"></i> Historique des posts</div>
      <div id="history-list" class="history-section"></div>
    </div>
  </div>
</div>

<div class="copied-toast" id="toast">✓ Copié dans le presse-papier</div>

<script>
const filialeData = {
  aina: { label: 'Dynamique · Corporate · Fun', cls: 'desc-aina', tone: 'dynamique, corporate avec une touche fun et bienveillante, voix interne du groupe, ton chaleureux et mobilisateur' },
  nexthope: { label: 'Sérieux · Institutionnel', cls: 'desc-nexthope', tone: 'sérieux, institutionnel, professionnel et rigoureux, vocabulaire formel, posture d\'expert' },
  cartin: { label: 'Dynamique · Jeune · Sérieux', cls: 'desc-cartin', tone: 'dynamique et jeune tout en restant sérieux, ton moderne et accessible, proche de son audience' }
};
const filialeNames = { aina: 'Aina (groupe)', nexthope: 'Nexthope', cartin: "Cart'in" };
const maxChars = { LinkedIn: 1300, Facebook: 800, Instagram: 600, 'Twitter/X': 280 };
const networkTips = {
  LinkedIn: 'Format professionnel, paragraphes courts, call-to-action clair, 3-5 hashtags pertinents.',
  Facebook: 'Ton accessible, peut inclure une question pour favoriser les commentaires, 2-3 hashtags.',
  Instagram: 'Visuel et impactant, emojis modérés, nombreux hashtags (10-15) pertinents.',
  'Twitter/X': 'Très concis, percutant, 1-2 hashtags max, direct.'
};

let selectedNetwork = 'LinkedIn';
let history = JSON.parse(localStorage.getItem('commhub_history') || '[]');

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const idx = tab === 'generator' ? 0 : 1;
  document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
}

function updateFilialeDesc() {
  const f = document.getElementById('filiale').value;
  const el = document.getElementById('filiale-desc');
  el.textContent = filialeData[f].label;
  el.className = 'filiale-desc ' + filialeData[f].cls;
}

function selectNetwork(el, name) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  selectedNetwork = name;
}

function updateCharCount() {
  const len = document.getElementById('sujet').value.length;
  const el = document.getElementById('char-count');
  el.textContent = len;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function copyPost() {
  const text = document.getElementById('result-text').innerText;
  navigator.clipboard.writeText(text).then(() => showToast('✓ Copié dans le presse-papier'));
}

function saveToHistory() {
  const f = document.getElementById('filiale').value;
  const text = document.getElementById('result-text').innerText;
  if (!text) return;
  const item = {
    id: Date.now(),
    filiale: f,
    filialeName: filialeNames[f],
    network: selectedNetwork,
    text: text,
    date: new Date().toLocaleDateString('fr-FR')
  };
  history.unshift(item);
  localStorage.setItem('commhub_history', JSON.stringify(history));
  showToast('✓ Post sauvegardé dans l\'historique');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (history.length === 0) {
    el.innerHTML = '<div class="empty-history"><i class="ti ti-inbox" style="font-size:32px;display:block;margin-bottom:8px;"></i>Aucun post sauvegardé</div>';
    return;
  }
  el.innerHTML = history.map(item => `
    <div class="history-item">
      <div class="history-item-meta">
        <span class="history-badge filiale-desc ${filialeData[item.filiale]?.cls || 'desc-aina'}">${item.filialeName}</span>
        <span style="font-size:12px;color:#888;">${item.network}</span>
        <span style="font-size:12px;color:#bbb;margin-left:auto;">${item.date}</span>
      </div>
      <div class="history-text">${item.text}</div>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button class="action-btn" onclick="copyHistoryItem(${item.id})"><i class="ti ti-copy"></i> Copier</button>
        <button class="action-btn" onclick="deleteHistoryItem(${item.id})" style="color:#E24B4A;"><i class="ti ti-trash"></i> Supprimer</button>
      </div>
    </div>
  `).join('');
}

function copyHistoryItem(id) {
  const item = history.find(h => h.id === id);
  if (item) navigator.clipboard.writeText(item.text).then(() => showToast('✓ Copié !'));
}

function deleteHistoryItem(id) {
  history = history.filter(h => h.id !== id);
  localStorage.setItem('commhub_history', JSON.stringify(history));
  renderHistory();
}

async function generatePost() {
  const sujet = document.getElementById('sujet').value.trim();
  if (!sujet) { alert('Merci d\'indiquer un sujet pour le post.'); return; }

  const f = document.getElementById('filiale').value;
  const objectif = document.getElementById('objectif').value;
  const tone = filialeData[f].tone;
  const filialeName = filialeNames[f];

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('result-wrapper').style.display = 'none';

  const prompt = `Tu es un expert en communication digitale. Rédige un post ${selectedNetwork} pour la filiale "${filialeName}".

TON ET STYLE : ${tone}
OBJECTIF : ${objectif}
SUJET : ${sujet}
RÉSEAU : ${selectedNetwork} — ${networkTips[selectedNetwork]}
LONGUEUR MAX : ${maxChars[selectedNetwork]} caractères

Rédige UNIQUEMENT le post, prêt à publier. Pas d'introduction, pas d'explication. Juste le post.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || 'Erreur lors de la génération.';

    const badge = document.getElementById('result-filiale-badge');
    badge.textContent = filialeData[f].label;
    badge.className = 'filiale-desc ' + filialeData[f].cls;
    document.getElementById('result-network').textContent = '· ' + selectedNetwork;
    document.getElementById('result-char-count').textContent = text.length + ' caractères';
    document.getElementById('result-text').textContent = text;
    document.getElementById('result-wrapper').style.display = 'block';
  } catch(e) {
    alert('Erreur de connexion. Vérifie ta connexion et réessaie.');
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('gen-btn').disabled = false;
  }
}
</script>
</body>
</html>
